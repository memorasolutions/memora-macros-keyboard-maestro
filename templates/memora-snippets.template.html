<!DOCTYPE html>
<html lang='fr'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>MEMORA — Snippets</title>
  <style>
    :root{--bg:#f5f5f7;--surface:#fff;--surface2:#f0f0f3;--border:#d8d8de;--text:#1d1d1f;--text2:#6e6e73;--accent:#0071e3;--accent-weak:#e8f1fe;--danger:#ff3b30;--radius:12px;--shadow:0 1px 2px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.06);}
    @media (prefers-color-scheme:dark){:root{--bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;--border:#48484a;--text:#f5f5f7;--text2:#a1a1a6;--accent:#0a84ff;--accent-weak:rgba(10,132,255,.18);--danger:#ff453a;--shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.55);}}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
    body{background:var(--bg);color:var(--text);padding:0;font-size:14px;}
    .header{position:sticky;top:0;backdrop-filter:saturate(180%) blur(14px);background:color-mix(in srgb,var(--bg) 80%,transparent);border-bottom:1px solid var(--border);padding:12px 16px;z-index:10;display:flex;align-items:center;gap:12px;}
    .header h1{font-size:18px;font-weight:600;}
    .search{flex:1;position:relative;}
    .search input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;}
    .search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);}
    .close-btn{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
    .close-btn:hover{background:var(--surface2);}
    .folders{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 0;}
    .chip{padding:5px 12px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;transition:background .15s,color .15s;}
    .chip:hover{background:var(--surface2);}
    .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .content{padding:12px 16px 90px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s,background .15s,transform .05s;}
    .card:hover{border-color:var(--accent);}
    .card-header{display:flex;align-items:center;gap:8px;}
    .drag-handle{cursor:grab;color:var(--text2);font-size:14px;}
    .card input[type='checkbox']{width:18px;height:18px;cursor:pointer;flex:none;accent-color:var(--accent);}
    .card-label{flex:1;cursor:pointer;font-weight:500;word-break:break-word;}
    .badge{background:var(--accent-weak);color:var(--accent);padding:2px 6px;border-radius:6px;font-size:12px;font-weight:600;}
    .card-actions{display:flex;gap:4px;justify-content:flex-end;}
    .card-actions button{background:none;border:none;color:var(--text2);font-size:14px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .card-actions button:hover{background:var(--surface2);color:var(--text);}
    .card-actions .danger:hover{color:var(--danger);}
    .card-actions button[disabled]{opacity:.35;cursor:default;}
    .empty{grid-column:1/-1;color:var(--text2);text-align:center;padding:28px;}
    .add-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;color:var(--text2);font-weight:500;margin-top:10px;width:100%;}
    .add-btn:hover{background:var(--surface2);color:var(--text);}
    .footer{position:fixed;bottom:0;left:0;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(180%) blur(14px);border-top:1px solid var(--border);}
    .count{color:var(--text2);font-size:13px;}
    .btn{padding:8px 18px;border-radius:var(--radius);font-weight:600;cursor:pointer;border:none;font-size:14px;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-secondary{background:var(--surface2);color:var(--text);}
    .btn[disabled]{opacity:.5;cursor:not-allowed;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:20;padding:20px;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.3);width:100%;max-width:560px;max-height:84vh;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
    .modal h2{font-size:17px;font-weight:600;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group label{font-weight:500;color:var(--text2);font-size:13px;}
    .form-group input,.form-group textarea,.var-group input,.var-group select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;}
    .form-group textarea{min-height:120px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
    .input-error{border-color:var(--danger)!important;}
    .checkbox-group{display:flex;align-items:center;gap:8px;}
    .checkbox-group input{width:18px;height:18px;accent-color:var(--accent);}
    .help{background:var(--surface2);padding:12px;border-radius:var(--radius);font-size:13px;color:var(--text2);}
    .help code{background:var(--surface);padding:1px 5px;border-radius:5px;border:1px solid var(--border);}
    .help ul{padding-left:18px;margin-top:6px;}
    .help li{margin-top:4px;}
    .var-group{display:flex;flex-direction:column;gap:6px;}
    .var-group label{font-weight:500;font-size:13px;}
    .preview{background:var(--surface2);padding:12px;border-radius:var(--radius);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;color:var(--text);min-height:48px;}
    .btns{display:flex;gap:10px;margin-top:4px;}
    .btns .btn{flex:1;}
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  </style>
</head>
<body data-kmwindow='720,640'>
  <div class='header'>
    <h1>Snippets</h1>
    <div class='search'><input type='text' id='search-input' placeholder='Rechercher un snippet…' aria-label='Rechercher un snippet'></div>
    <button class='close-btn' id='lib-btn' title='Importer / Exporter la bibliothèque' aria-label='Bibliothèque'>📚</button>
    <button class='close-btn' id='close-btn' aria-label='Fermer'>✕</button>
  </div>
  <div class='folders' id='folders'></div>
  <div class='content'>
    <div class='grid' id='snippets-grid'></div>
    <button class='add-btn' id='add-snippet' type='button' aria-label='Ajouter un snippet'>➕ Ajouter un snippet</button>
  </div>
  <div class='footer'>
    <span class='count' id='count'>0 sélectionné</span>
    <button class='btn btn-primary' id='insert-btn' type='button' disabled>Insérer</button>
  </div>

  <script>
    let snippets = [];
    let editingIndex = -1;
    let activeFolder = '';

    const normalize = (s) => String(s).normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
    const formatDate = () => new Intl.DateTimeFormat('fr-CA', { month: 'long', year: 'numeric' }).format(new Date());
    const escapeHtml = (str) => String(str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[s]));
    const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function hasVars(t) { return /{{(champ|choix):[^}]+}}/.test(t); }
    function extractVars(t) {
      const vars = []; const re = /{{(champ|choix):([^}=]+)(?:=([^}]+))?}}/g; let m;
      while ((m = re.exec(t)) !== null) vars.push({ type: m[1], label: m[2], choices: m[1] === 'choix' && m[3] ? m[3].split('|') : [] });
      return vars;
    }
    function collectVars(checked) {
      const map = new Map();
      for (const s of checked) for (const v of extractVars(s.texte)) if (!map.has(v.label)) map.set(v.label, v);
      return [...map.values()];
    }
    function resolve(text, values) {
      let r = text.replace(/{{date}}/g, formatDate()).replace(/{{alea:([^}]+)}}/g, (m, o) => rnd(o.split('|')));
      for (const label in values) {
        const re = new RegExp('{{(?:champ|choix):' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '[^}]*}}', 'g');
        r = r.replace(re, values[label]);
      }
      return r;
    }
    function assemble(checked, values) { return checked.map(s => resolve(s.texte, values)).join('\n\n'); }

    // Exemples au tout premier lancement (variable jamais définie) — montrent les 4 types de variables
    const DEFAULTS = [
      { terme: 'Salutation', texte: 'Bonjour {{champ:Prénom}},', coché: false, dossier: 'Courriel' },
      { terme: 'Réponse (ton)', texte: '{{choix:Ton=Formel|Amical}} — merci pour votre message.', coché: false, dossier: 'Courriel' },
      { terme: 'Mois courant', texte: 'Nous sommes en {{date}}.', coché: false, dossier: 'Général' },
      { terme: 'Intro variée', texte: '{{alea:Bonjour|Salut|Allô}} !', coché: false, dossier: 'Courriel' },
      { terme: 'Coordonnées MEMORA', texte: 'MEMORA solutions — https://memora.solutions — info@memora.ca', coché: false, dossier: 'Général' }
    ];
    function loadState() {
      if (!window.KeyboardMaestro) return;
      const raw = window.KeyboardMaestro.GetVariable('memora_snippets');
      if (!raw) { snippets = JSON.parse(JSON.stringify(DEFAULTS)); persist(); return; }
      try {
        snippets = JSON.parse(raw) || [];
        if (!Array.isArray(snippets)) snippets = [];
        snippets = snippets.map(s => ({ terme: typeof s.terme === 'string' ? s.terme : '', texte: typeof s.texte === 'string' ? s.texte : '', coché: !!s.coché, dossier: typeof s.dossier === 'string' ? s.dossier : '' }));
      } catch (e) { snippets = []; }
    }
    function persist() { if (window.KeyboardMaestro) window.KeyboardMaestro.SetVariable('memora_snippets', JSON.stringify(snippets)); }

    function getFolders() { return [...new Set(snippets.map(s => (s.dossier || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr')); }
    function renderFolders() {
      const bar = document.getElementById('folders');
      const fs = getFolders();
      if (activeFolder && !fs.includes(activeFolder)) activeFolder = '';
      bar.innerHTML = '';
      if (fs.length === 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      const mk = (label, val) => { const b = document.createElement('button'); b.type = 'button'; b.className = 'chip' + (activeFolder === val ? ' active' : ''); b.textContent = label; b.onclick = () => { activeFolder = val; render(); }; return b; };
      bar.appendChild(mk('Tous', ''));
      fs.forEach(f => bar.appendChild(mk(f, f)));
    }

    function render() {
      const grid = document.getElementById('snippets-grid');
      const term = normalize(document.getElementById('search-input').value);
      renderFolders();
      grid.innerHTML = '';
      let shown = 0;
      snippets.forEach((s, index) => { // index = index RÉEL dans snippets[]
        if (activeFolder && (s.dossier || '') !== activeFolder) return;
        if (term && !(normalize(s.terme).includes(term) || normalize(s.texte).includes(term))) return;
        shown++;
        const last = snippets.length - 1;
        const card = document.createElement('div');
        card.className = 'card'; card.draggable = true; card.dataset.index = index;
        card.innerHTML =
          "<div class='card-header'>" +
            "<span class='drag-handle' aria-hidden='true'>⠿</span>" +
            "<input type='checkbox' " + (s.coché ? 'checked' : '') + " data-index='" + index + "' aria-label='Cocher'>" +
            "<span class='card-label' data-index='" + index + "'>" + escapeHtml(s.terme) + "</span>" +
            (hasVars(s.texte) ? "<span class='badge' title='Contient des variables'>{ }</span>" : '') +
          "</div>" +
          "<div class='card-actions'>" +
            "<button class='edit-btn' data-index='" + index + "' aria-label='Modifier'>✎</button>" +
            "<button class='move-up' data-index='" + index + "' aria-label='Monter' " + (index === 0 ? 'disabled' : '') + ">▲</button>" +
            "<button class='move-down' data-index='" + index + "' aria-label='Descendre' " + (index === last ? 'disabled' : '') + ">▼</button>" +
            "<button class='delete-btn danger' data-index='" + index + "' aria-label='Supprimer'>🗑</button>" +
          "</div>";
        grid.appendChild(card);
      });
      if (shown === 0) {
        const e = document.createElement('div'); e.className = 'empty';
        e.textContent = snippets.length === 0 ? 'Aucun snippet. Cliquez sur « Ajouter un snippet ».' : 'Aucun résultat pour cette recherche.';
        grid.appendChild(e);
      }
      const n = snippets.filter(s => s.coché).length;
      document.getElementById('count').textContent = n + (n > 1 ? ' sélectionnés' : ' sélectionné');
      document.getElementById('insert-btn').disabled = n === 0;
    }

    function openEdit(index) {
      editingIndex = index;
      const isNew = index === -1;
      const s = isNew ? { terme: '', texte: '', coché: false } : snippets[index];
      const ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'edit-overlay';
      ov.innerHTML =
        "<div class='modal'>" +
          "<h2>" + (isNew ? 'Ajouter un snippet' : 'Modifier le snippet') + "</h2>" +
          "<div class='form-group'><label for='edit-terme'>Terme</label><input type='text' id='edit-terme' value=\"" + escapeHtml(s.terme) + "\"></div>" +
          "<div class='form-group'><label for='edit-texte'>Texte</label><textarea id='edit-texte' placeholder='Texte du snippet…'>" + escapeHtml(s.texte) + "</textarea></div>" +
          "<div class='form-group'><label for='edit-dossier'>Dossier (optionnel)</label><input type='text' id='edit-dossier' list='folder-list' value=\"" + escapeHtml(s.dossier || '') + "\" placeholder='Ex. Courriel'><datalist id='folder-list'>" + getFolders().map(f => "<option value=\"" + escapeHtml(f) + "\"></option>").join('') + "</datalist></div>" +
          "<div class='checkbox-group'><input type='checkbox' id='edit-coche' " + (s.coché ? 'checked' : '') + "><label for='edit-coche'>Coché par défaut</label></div>" +
          "<div class='help'><strong>Variables :</strong><ul>" +
            "<li><code>{{date}}</code> → mois et année (ex. juin 2026)</li>" +
            "<li><code>{{champ:Étiquette}}</code> → champ texte demandé à l'insertion</li>" +
            "<li><code>{{choix:Étiquette=A|B|C}}</code> → menu déroulant</li>" +
            "<li><code>{{alea:A|B|C}}</code> → valeur au hasard</li>" +
          "</ul></div>" +
          "<div class='btns'><button class='btn btn-secondary' id='edit-cancel' type='button'>Annuler</button>" +
          "<button class='btn btn-primary' id='edit-save' type='button'>" + (isNew ? 'Ajouter' : 'Enregistrer') + "</button></div>" +
        "</div>";
      document.body.appendChild(ov);
      document.getElementById('edit-terme').focus();
    }
    function closeEdit() { const o = document.getElementById('edit-overlay'); if (o) o.remove(); }
    function saveEdit() {
      const t = document.getElementById('edit-terme');
      const terme = t.value.trim();
      if (!terme) { t.classList.add('input-error'); t.focus(); return; } // validation inline (pas d'alert natif)
      const tile = { terme, texte: document.getElementById('edit-texte').value, coché: document.getElementById('edit-coche').checked, dossier: document.getElementById('edit-dossier').value.trim() };
      if (editingIndex === -1) snippets.push(tile); else snippets[editingIndex] = tile;
      persist(); closeEdit(); render();
    }
    function del(i) { snippets.splice(i, 1); persist(); render(); }
    function move(i, d) { const j = i + d; if (j < 0 || j >= snippets.length) return; const t = snippets[i]; snippets[i] = snippets[j]; snippets[j] = t; persist(); render(); }

    function doInsert() {
      const checked = snippets.filter(s => s.coché);
      if (!checked.length) return;
      const vars = collectVars(checked);
      if (!vars.length) { submitText(assemble(checked, {})); return; }
      openFill(vars, checked);
    }
    function submitText(txt) {
      if (window.KeyboardMaestro) { window.KeyboardMaestro.SetVariable('memora_texte', txt); window.KeyboardMaestro.Submit('OK'); }
    }
    function openFill(vars, checked) {
      const ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'fill-overlay';
      let inputs = '';
      vars.forEach((v, i) => {
        if (v.type === 'champ') inputs += "<div class='var-group'><label for='vf-" + i + "'>" + escapeHtml(v.label) + "</label><input type='text' id='vf-" + i + "' data-label=\"" + escapeHtml(v.label) + "\" placeholder='Saisir…'></div>";
        else inputs += "<div class='var-group'><label for='vf-" + i + "'>" + escapeHtml(v.label) + "</label><select id='vf-" + i + "' data-label=\"" + escapeHtml(v.label) + "\">" + v.choices.map(o => "<option value=\"" + escapeHtml(o) + "\">" + escapeHtml(o) + "</option>").join('') + "</select></div>";
      });
      ov.innerHTML = "<div class='modal'><h2>Compléter les variables</h2>" + inputs +
        "<label style='font-size:13px;color:var(--text2);font-weight:500;'>Aperçu</label><div class='preview' id='fill-preview'></div>" +
        "<div class='btns'><button class='btn btn-secondary' id='fill-cancel' type='button'>Annuler</button>" +
        "<button class='btn btn-primary' id='fill-insert' type='button'>Insérer</button></div></div>";
      document.body.appendChild(ov);
      const readValues = () => { const vals = {}; ov.querySelectorAll('[data-label]').forEach(el => vals[el.dataset.label] = el.value); return vals; };
      const upd = () => { document.getElementById('fill-preview').textContent = assemble(checked, readValues()); };
      ov.querySelectorAll('[data-label]').forEach(el => { el.addEventListener('input', upd); el.addEventListener('change', upd); });
      ov.querySelector('#fill-cancel').addEventListener('click', () => ov.remove());
      ov.querySelector('#fill-insert').addEventListener('click', () => { submitText(assemble(checked, readValues())); ov.remove(); });
      upd();
      const f = ov.querySelector('[data-label]'); if (f) f.focus();
    }

    function openLibrary() {
      const ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'lib-overlay';
      ov.innerHTML =
        "<div class='modal'><h2>Bibliothèque</h2>" +
        "<div class='form-group'><label>Exporter — copiez ce JSON pour sauvegarder ou partager</label>" +
        "<textarea id='lib-export' readonly>" + escapeHtml(JSON.stringify(snippets, null, 2)) + "</textarea></div>" +
        "<div class='btns'><button class='btn btn-secondary' id='lib-copy' type='button'>Copier</button></div>" +
        "<div class='form-group'><label>Importer — collez un JSON de snippets</label>" +
        "<textarea id='lib-import' placeholder='[ { &quot;terme&quot;: &quot;…&quot;, &quot;texte&quot;: &quot;…&quot; } ]'></textarea>" +
        "<div id='lib-msg' style='font-size:13px;'></div></div>" +
        "<div class='btns'><button class='btn btn-secondary' id='lib-merge' type='button'>Fusionner</button>" +
        "<button class='btn btn-primary' id='lib-replace' type='button'>Remplacer tout</button></div>" +
        "<div class='btns'><button class='btn btn-secondary' id='lib-close' type='button'>Fermer</button></div></div>";
      document.body.appendChild(ov);
      const msg = (t, ok) => { const e = ov.querySelector('#lib-msg'); e.textContent = t; e.style.color = ok ? 'var(--accent)' : 'var(--danger)'; };
      ov.querySelector('#lib-copy').addEventListener('click', () => { const ta = ov.querySelector('#lib-export'); try { navigator.clipboard.writeText(ta.value); msg('Copié ✓', true); } catch (e) { ta.select(); msg('Sélectionné — ⌘C pour copier.', true); } });
      const doImport = (replace) => {
        let arr; try { arr = JSON.parse(ov.querySelector('#lib-import').value); } catch (e) { msg('JSON invalide.', false); return; }
        if (!Array.isArray(arr)) { msg('Le JSON doit être une liste [ … ].', false); return; }
        const clean = arr.filter(x => x && typeof x === 'object').map(x => ({ terme: String(x.terme || ''), texte: String(x.texte || ''), coché: !!x.coché, dossier: typeof x.dossier === 'string' ? x.dossier : '' })).filter(x => x.terme || x.texte);
        if (!clean.length) { msg('Aucun snippet valide trouvé.', false); return; }
        if (replace) snippets = clean;
        else { const have = new Set(snippets.map(s => s.terme)); clean.forEach(c => { if (!have.has(c.terme)) snippets.push(c); }); }
        persist(); render(); ov.remove();
      };
      ov.querySelector('#lib-merge').addEventListener('click', () => doImport(false));
      ov.querySelector('#lib-replace').addEventListener('click', () => doImport(true));
      ov.querySelector('#lib-close').addEventListener('click', () => ov.remove());
    }

    function init() {
      loadState(); render();
      document.getElementById('lib-btn').addEventListener('click', openLibrary);
      document.getElementById('search-input').addEventListener('input', render);
      document.getElementById('add-snippet').addEventListener('click', () => openEdit(-1));
      document.getElementById('close-btn').addEventListener('click', () => { if (window.KeyboardMaestro) window.KeyboardMaestro.Cancel('Cancel'); });
      document.getElementById('insert-btn').addEventListener('click', doInsert);

      const grid = document.getElementById('snippets-grid');
      grid.addEventListener('click', e => {
        const el = e.target.closest('[data-index]'); if (!el) return;
        const i = parseInt(el.dataset.index, 10);
        if (e.target.matches('.edit-btn')) openEdit(i);
        else if (e.target.matches('.delete-btn')) del(i);
        else if (e.target.matches('.move-up')) move(i, -1);
        else if (e.target.matches('.move-down')) move(i, 1);
        else if (e.target.matches("input[type='checkbox']")) { snippets[i].coché = e.target.checked; persist(); render(); }
        else if (e.target.matches('.card-label')) { snippets[i].coché = !snippets[i].coché; persist(); render(); }
      });

      let dragIndex = -1;
      grid.addEventListener('dragstart', e => { const c = e.target.closest('.card'); if (c) { dragIndex = parseInt(c.dataset.index, 10); c.style.opacity = '.5'; } });
      grid.addEventListener('dragend', e => { const c = e.target.closest('.card'); if (c) c.style.opacity = '1'; });
      grid.addEventListener('drop', e => {
        e.preventDefault(); const c = e.target.closest('.card'); if (!c || dragIndex < 0) return;
        const to = parseInt(c.dataset.index, 10);
        if (to !== dragIndex) { const it = snippets.splice(dragIndex, 1)[0]; snippets.splice(to, 0, it); persist(); render(); }
        dragIndex = -1;
      });
      grid.addEventListener('dragover', e => e.preventDefault());

      document.addEventListener('click', e => {
        if (e.target.id === 'edit-save') saveEdit();
        else if (e.target.id === 'edit-cancel') closeEdit();
      });
      document.getElementById('edit-terme') && null;
      document.body.addEventListener('input', e => { if (e.target.id === 'edit-terme') e.target.classList.remove('input-error'); });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          const fill = document.getElementById('fill-overlay'); const ed = document.getElementById('edit-overlay'); const lib = document.getElementById('lib-overlay');
          if (fill) fill.remove(); else if (ed) ed.remove(); else if (lib) lib.remove();
          else if (window.KeyboardMaestro) window.KeyboardMaestro.Cancel('Cancel');
        } else if (e.key === 'Enter' && !e.target.matches('input, textarea, select') && !document.getElementById('edit-overlay') && !document.getElementById('fill-overlay') && !document.getElementById('lib-overlay')) {
          doInsert();
        }
      });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
  </script>
</body>
</html>
